<style>
  /* ===== Labor CRM — design system (theo mockup Claude Design) ===== */
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{background:#f6f8fb;font-family:'Be Vietnam Pro',system-ui,-apple-system,sans-serif;color:#0f172a;font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
  :root{--ac:#2563eb}
  .boot{padding:48px;text-align:center;color:#64748b}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:8px;border:2px solid transparent;background-clip:content-box}
  @keyframes lcfade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @keyframes lctoast{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes lcspin{to{transform:rotate(360deg)}}
  input,select,textarea,button{font-family:inherit}
  input:focus,select:focus,textarea:focus{outline:none}
  a{color:inherit;text-decoration:none}
  .mono{font-family:'IBM Plex Mono',monospace}
  .tnum{font-variant-numeric:tabular-nums}

  /* layout */
  .lc-root{display:flex;min-height:100vh}
  .lc-sidebar{width:248px;flex:0 0 248px;background:#0e1726;color:#cbd5e1;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .lc-brand{display:flex;align-items:center;gap:10px;padding:18px 18px 14px}
  .lc-logo{width:34px;height:34px;border-radius:9px;background:var(--ac);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
  .lc-nav{flex:1;overflow-y:auto;padding:4px 12px 12px;display:flex;flex-direction:column;gap:2px}
  .lc-navgrp{padding:14px 10px 5px;color:#475569;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
  .lc-navitem{position:relative;display:flex;align-items:center;gap:11px;width:100%;border:0;cursor:pointer;padding:9px 11px;border-radius:8px;text-align:left;font-size:13.5px;font-weight:500;background:none;color:#cbd5e1;transition:background .12s,color .12s}
  .lc-navitem:hover{background:rgba(148,163,184,.13)}
  .lc-navitem.on{background:rgba(148,163,184,.16);color:#fff}
  .lc-navitem.on::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--ac)}
  .lc-navitem .ic{flex:0 0 auto;display:flex}
  .lc-navbadge{background:color-mix(in srgb,var(--ac) 90%,#000);color:#fff;font-size:10.5px;font-weight:600;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px}
  .lc-sideuser{padding:12px;border-top:1px solid rgba(148,163,184,.14);display:flex;align-items:center;gap:10px}
  .lc-avatar{width:32px;height:32px;border-radius:8px;background:color-mix(in srgb,var(--ac) 22%,#1e293b);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12.5px;flex:0 0 auto}

  .lc-mainwrap{flex:1;min-width:0;display:flex;flex-direction:column}
  .lc-topbar{display:flex;align-items:center;gap:14px;padding:0 22px;height:62px;background:#fff;border-bottom:1px solid #e8edf3;position:sticky;top:0;z-index:30}
  .lc-mtop{display:none;align-items:center;gap:11px;padding:0 14px;height:54px;background:#0e1726;color:#fff;position:sticky;top:0;z-index:30}
  .lc-main{flex:1;min-width:0;padding:22px 26px;background:#f6f8fb}
  .lc-wrap{max-width:1480px;margin:0 auto}
  .lc-bottomnav{display:none;position:fixed;left:0;right:0;bottom:0;height:64px;background:#fff;border-top:1px solid #e8edf3;z-index:40;justify-content:space-around;align-items:stretch;padding:0 2px;max-width:100%}
  .lc-bn{flex:1;border:0;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:#94a3b8;position:relative;font-size:10.5px;font-weight:500}
  .lc-bn.on{color:var(--ac);font-weight:700}

  /* controls */
  .lc-pillbtn{display:flex;align-items:center;gap:8px;padding:7px 11px;border:1px solid #e2e8f0;border-radius:9px;background:#fff;font-size:13px;font-weight:500;cursor:pointer;color:#334155}
  .lc-pillbtn:hover{background:#f8fafc}
  .lc-menu{position:absolute;right:0;top:46px;background:#fff;border:1px solid #e2e8f0;border-radius:11px;box-shadow:0 16px 40px rgba(15,23,42,.16);padding:6px;min-width:200px;z-index:50;animation:lcfade .14s ease}
  .lc-menu button{display:flex;align-items:center;justify-content:space-between;width:100%;border:0;background:none;cursor:pointer;padding:8px 10px;border-radius:7px;text-align:left;font-size:13px;color:#334155}
  .lc-menu button:hover{background:#f1f5f9}

  /* cards / grids */
  .lc-card{background:#fff;border:1px solid #e8edf3;border-radius:13px;padding:17px 18px}
  .lc-card.p0{padding:0;overflow:hidden}
  .lc-h{font-size:14.5px;font-weight:700}
  .lc-statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(186px,1fr));gap:13px}
  .lc-dash2{display:grid;grid-template-columns:1.5fr 1fr;gap:15px;align-items:start}
  .lc-stat{background:#fff;border:1px solid #e8edf3;border-radius:13px;padding:15px 16px 14px}
  .lc-stat .k{color:#64748b;font-size:12.5px;font-weight:500}
  .lc-stat .v{font-size:26px;font-weight:700;letter-spacing:-.6px;margin-top:9px;font-variant-numeric:tabular-nums}
  .lc-stat .s{font-size:12px;font-weight:600;margin-top:3px}
  .lc-ico{width:31px;height:31px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}

  /* funnel / bars */
  .lc-bar{display:flex;align-items:center;gap:12px}
  .lc-bar .lbl{width:74px;font-size:12.5px;color:#475569;flex:0 0 auto}
  .lc-bar .track{flex:1;height:28px;background:#f1f5f9;border-radius:7px;overflow:hidden}
  .lc-bar .fill{height:100%;background:var(--ac);border-radius:7px;transition:width .5s cubic-bezier(.4,0,.2,1)}
  .lc-bar .num{width:54px;text-align:right;font-size:13.5px;font-weight:700;font-variant-numeric:tabular-nums;flex:0 0 auto}
  .lc-bar.sm .track{height:10px}.lc-bar.sm .lbl{width:96px;font-size:13px;font-weight:500}.lc-bar.sm .num{width:48px;font-size:13px}

  /* table */
  .lc-table{width:100%;border-collapse:collapse}
  .lc-table th{text-align:left;padding:11px 14px;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid #e8edf3;background:#fbfcfe;white-space:nowrap}
  .lc-table td{padding:11px 14px;border-bottom:1px solid #f1f5f9;font-size:13px}
  .lc-table tbody tr{cursor:pointer}
  .lc-table tbody tr:hover{background:#f8fafc}
  .lc-table .r{text-align:right;font-variant-numeric:tabular-nums}
  .lc-tablewrap{overflow-x:auto}

  /* badges / buttons */
  .lc-badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .lc-tag{display:inline-block;font-size:11.5px;font-weight:600;padding:2px 8px;border-radius:6px;white-space:nowrap}
  .lc-btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:9px 15px;border:0;border-radius:9px;background:var(--ac);color:#fff;font-size:13.5px;font-weight:600;cursor:pointer;white-space:nowrap}
  .lc-btn:hover{background:color-mix(in srgb,var(--ac),#000 8%)}
  .lc-btn.ghost{background:#fff;color:#475569;border:1px solid #e2e8f0}
  .lc-btn.ghost:hover{background:#f8fafc}
  .lc-btn.soft{background:color-mix(in srgb,var(--ac) 7%,#fff);color:var(--ac);border:1px solid color-mix(in srgb,var(--ac) 30%,#e2e8f0)}
  .lc-input,.lc-select{padding:9px 11px;border:1px solid #e2e8f0;border-radius:9px;font-size:13px;background:#fff;color:#334155}
  .lc-select{cursor:pointer}
  .lc-search{position:relative;flex:1;min-width:180px;max-width:300px}
  .lc-search input{width:100%;padding:9px 11px 9px 34px;border:1px solid #e2e8f0;border-radius:9px;font-size:13px;background:#fff;color:#334155}
  .lc-search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%)}
  .lc-toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:14px}
  .lc-empty{background:#fff;border:1px solid #e8edf3;border-radius:13px;padding:52px 24px;text-align:center}
  .lc-spin{width:30px;height:30px;border:3px solid #e8edf3;border-top-color:var(--ac);border-radius:50%;margin:0 auto;animation:lcspin .7s linear infinite}
  @keyframes lcspin{to{transform:rotate(360deg)}}
  .lc-sec{font-size:14.5px;font-weight:700;margin:16px 2px 9px}

  /* form fields (modal/detail) */
  .lc-field{margin-bottom:13px}
  .lc-field label{display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:5px}
  .lc-field input,.lc-field select,.lc-field textarea{width:100%;padding:9px 11px;border:1px solid #e2e8f0;border-radius:9px;font-size:13.5px;color:#0f172a;background:#fff}
  .lc-field textarea{resize:vertical;font-family:inherit}
  .lc-grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .lc-grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

  /* modal / toast */
  .lc-modal{position:fixed;inset:0;background:rgba(15,23,42,.46);z-index:60;display:flex;align-items:center;justify-content:center;padding:20px;animation:lcfade .14s ease}
  .lc-modalcard{background:#fff;border-radius:15px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 28px 70px rgba(15,23,42,.32);animation:lcfade .2s ease}
  .lc-mhead{padding:16px 20px;border-bottom:1px solid #eef2f7;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:2}
  .lc-mbody{padding:18px 20px}
  .lc-mfoot{padding:14px 20px;border-top:1px solid #eef2f7;display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:#fff}
  .lc-x{border:0;background:#f1f5f9;width:30px;height:30px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .lc-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:80;background:#0e1726;color:#fff;padding:11px 18px;border-radius:11px;font-size:13.5px;font-weight:500;box-shadow:0 14px 34px rgba(15,23,42,.38);display:flex;align-items:center;gap:10px;animation:lctoast .22s ease;max-width:90vw}
  .lc-msg{margin-top:10px;padding:10px 12px;border-radius:9px;font-size:13px}
  .lc-msg.ok{background:#dcfce7;color:#15803d}.lc-msg.err{background:#fee2e2;color:#b91c1c}.lc-msg.warn{background:#fffbeb;color:#92400e;border:1px solid #fde68a}

  /* responsive */
  @media(max-width:860px){
    .lc-sidebar,.lc-topbar,.lc-desktoponly{display:none!important}
    .lc-mtop{display:flex!important}
    .lc-bottomnav{display:flex!important}
    .lc-main{padding:14px 14px 86px!important}
    .lc-dash2{grid-template-columns:1fr!important}
    .lc-statgrid{grid-template-columns:repeat(2,1fr)!important}
    .lc-grid2,.lc-grid4{grid-template-columns:1fr 1fr!important}
    .lc-modal{align-items:flex-end!important;padding:0!important}
    .lc-modalcard{max-width:100%!important;border-radius:18px 18px 0 0!important;max-height:92vh!important}
    .lc-hidesm{display:none!important}
  }
  @media(min-width:861px){ .lc-mobileonly{display:none!important} }
</style>
